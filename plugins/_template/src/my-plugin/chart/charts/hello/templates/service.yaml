apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-hello
  labels:
    app.kubernetes.io/name: hello
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 80
      protocol: TCP
  selector:
    app.kubernetes.io/name: hello
    app.kubernetes.io/instance: {{ .Release.Name }}
