apiVersion: kuberse.io/v1
kind: Plugin
metadata:
  name: my-plugin
  version: 1.0.0
  description: "A minimal hello-world Kuberse plugin"
  author: YOUR_GITHUB_USERNAME
spec:
  manifests:
    argocd: "."
  artifacts:
    images: []
    charts:
      - oci://ghcr.io/YOUR_GITHUB_USERNAME/my-plugin-plugin/charts/my-plugin:latest
  placeholders:
    - REGISTRY_URL
    - GIT_BASE_URL
    - ORG_NAME
    - BASE_DOMAIN
